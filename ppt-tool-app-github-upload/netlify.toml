# Netlify 配置
# 部署后, 静态前端在 public/, 后端 Functions 在 functions/

[build]
  publish = "public"
  functions = "functions"

# Functions 配置
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai"]

# /api/* → /.netlify/functions/* 重写, 让前端能用简单路径
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 默认环境变量(部署时通过 Netlify UI 覆盖)
[build.environment]
  NODE_VERSION = "18"

# 安全头(可选, 防止意外被 iframe 嵌入)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
